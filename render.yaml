services:
  - type: web
    name: basketiq
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: MONGO_URI
        sync: false          # you paste this in Render dashboard
      - key: MONGO_DB_NAME
        value: grocery_admin
      - key: ADMIN_BOOTSTRAP_EMAIL
        sync: false
      - key: ADMIN_BOOTSTRAP_PASSWORD
        sync: false
      - key: ADMIN_BOOTSTRAP_NAME
        value: System Admin
