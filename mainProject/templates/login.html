<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login | BasketIQ</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>tailwind.config={theme:{extend:{colors:{primary:"#006036",background:"#f9f9f6"}}}}</script>
    <style>body{font-family:'Plus Jakarta Sans',sans-serif;background-color:#f9f9f6}.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}</style>
</head>
<body class="bg-background pt-24 pb-28">

{% include '_navbar.html' %}

<main class="min-h-[70vh] flex items-center justify-center px-6">
    <div class="max-w-md w-full bg-white p-10 rounded-[2.5rem] shadow-xl border border-zinc-100">
        <h2 class="text-3xl font-extrabold text-center mb-8">Welcome Back</h2>

        <form id="loginForm" class="space-y-4">
            <input type="email" id="email" placeholder="Email Address" required class="w-full px-5 py-4 rounded-2xl bg-zinc-50 border-none focus:ring-2 focus:ring-primary">
            <input type="password" id="password" placeholder="Password" required class="w-full px-5 py-4 rounded-2xl bg-zinc-50 border-none focus:ring-2 focus:ring-primary">

            <button type="submit" id="submitBtn" class="w-full bg-primary text-white py-5 rounded-full font-bold text-lg shadow-lg hover:bg-emerald-800 transition-all flex items-center justify-center gap-2">
                Login Now
            </button>
        </form>

        <p id="loginError" class="text-center mt-4 text-sm text-red-500 hidden"></p>

        <p class="text-center mt-6 text-sm text-zinc-500">
            New to BasketIQ? <a href="/signup/" class="text-primary font-bold">Create Account</a>
        </p>
    </div>
</main>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> Logging in...';

    const data = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
    };

    try {
        const response = await fetch('/api/auth/login/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        let result = {};
        try {
            result = await response.json();
        } catch (_) {
            result = {};
        }

        if (response.ok && result.token) {
            localStorage.setItem('token', result.token);
            localStorage.setItem('user_name', result.name);
            window.location.href = '/index/';
        } else {
            const errEl = document.getElementById('loginError');
            const backendMsg = result.error || result.detail;
            errEl.textContent = backendMsg || `Login failed (${response.status}). Check email/password.`;
            errEl.classList.remove('hidden');
            btn.disabled = false;
            btn.innerHTML = 'Login Now';
        }
    } catch (err) {
        const errEl = document.getElementById('loginError');
        errEl.textContent = 'Cannot reach backend. Make sure user server is running on 127.0.0.1:8001.';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = 'Login Now';
    }
});
</script>
</body>
</html>
