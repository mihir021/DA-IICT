<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Product Details | BasketIQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>tailwind.config={theme:{extend:{colors:{primary:"#006036",background:"#f9f9f6"}}}}</script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f9f9f6; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        .suggestion-card { cursor: pointer; transition: all 0.3s ease; }
        .suggestion-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,96,54,0.1); }
        @keyframes sk { 0%{background-color:#e5e7eb} 50%{background-color:#f3f4f6} 100%{background-color:#e5e7eb} }
        .skeleton { animation: sk 1.5s infinite ease-in-out; border-radius: 1rem; }
        @keyframes slideDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
        .animate-slide-down { animation: slideDown 0.5s ease-out; }
    </style>
</head>
<body class="bg-background pt-24 pb-28">

{% include '_navbar.html' %}

<!-- Success Toast -->
<div id="successToast" class="hidden fixed top-24 left-1/2 -translate-x-1/2 z-[60] bg-emerald-50 border border-emerald-200 text-emerald-800 px-8 py-4 rounded-2xl shadow-xl text-center animate-slide-down max-w-lg font-bold"></div>

<main class="max-w-6xl mx-auto px-6 animate-fade-in">

    <!-- Breadcrumb -->
    <nav class="mb-8 flex items-center gap-2 text-sm text-zinc-400">
        <a href="/index/" class="hover:text-primary transition-colors">Market</a>
        <span class="material-symbols-outlined text-xs">chevron_right</span>
        <span id="breadcrumbCategory" class="hover:text-primary cursor-pointer">Category</span>
        <span class="material-symbols-outlined text-xs">chevron_right</span>
        <span id="breadcrumbProduct" class="text-zinc-700 font-semibold">Product</span>
    </nav>

    <!-- Product Detail Section -->
    <section id="productDetail" class="grid grid-cols-1 md:grid-cols-2 gap-12 mb-20">
        <!-- Left: Image -->
        <div class="bg-white rounded-[2.5rem] p-8 shadow-sm flex items-center justify-center aspect-square">
            <div id="productImageSkeleton" class="skeleton w-full h-full"></div>
            <img id="productImage" class="hidden max-w-full max-h-80 object-contain" alt="Product image"/>
        </div>

        <!-- Right: Info -->
        <div class="flex flex-col justify-center space-y-6">
            <div>
                <span id="productCategory" class="inline-flex items-center gap-1 px-4 py-1.5 bg-emerald-50 text-primary text-xs font-bold rounded-full uppercase tracking-widest mb-3"></span>
                <div id="discountBadge" class="hidden inline-flex items-center gap-1 ml-2 px-3 py-1.5 bg-amber-100 text-amber-700 text-xs font-bold rounded-full uppercase">
                    <span class="material-symbols-outlined text-sm">local_offer</span>
                    <span id="discountPercent"></span>% OFF
                </div>
            </div>
            <h1 id="productName" class="text-4xl font-extrabold text-zinc-900">Loading...</h1>
            <p id="productWeight" class="text-zinc-500 text-lg"></p>

            <!-- Price -->
            <div class="flex items-baseline gap-4">
                <span id="productFinalPrice" class="text-4xl font-extrabold text-primary">₹0</span>
                <span id="productOriginalPrice" class="hidden text-xl text-zinc-400 line-through">₹0</span>
                <span id="savingsTag" class="hidden px-3 py-1 bg-emerald-100 text-primary text-xs font-bold rounded-full">You save ₹0</span>
            </div>

            <!-- Keywords -->
            <div id="keywordsContainer" class="flex flex-wrap gap-2"></div>

            <!-- Quantity & Add to Cart -->
            <div class="flex items-center gap-4 mt-4">
                <div class="flex items-center bg-zinc-100 rounded-2xl overflow-hidden">
                    <button onclick="changeQty(-1)" class="w-12 h-12 flex items-center justify-center text-lg font-bold text-zinc-700 hover:bg-zinc-200 transition-colors">−</button>
                    <span id="qtyValue" class="w-12 h-12 flex items-center justify-center text-lg font-extrabold">1</span>
                    <button onclick="changeQty(1)" class="w-12 h-12 flex items-center justify-center text-lg font-bold text-zinc-700 hover:bg-zinc-200 transition-colors">+</button>
                </div>
                <button id="addToCartBtn" onclick="addToCart()" class="flex-1 h-14 bg-primary text-white font-bold text-lg rounded-2xl shadow-lg shadow-emerald-900/20 hover:bg-emerald-800 active:scale-95 transition-all flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">shopping_cart</span>
                    Add to Cart
                </button>
            </div>

            <!-- Product info badges -->
            <div class="grid grid-cols-3 gap-3 mt-4">
                <div class="bg-white rounded-2xl p-4 text-center shadow-sm border border-zinc-50">
                    <span class="material-symbols-outlined text-primary mb-1">verified</span>
                    <p class="text-[10px] font-bold text-zinc-500 uppercase">Quality Assured</p>
                </div>
                <div class="bg-white rounded-2xl p-4 text-center shadow-sm border border-zinc-50">
                    <span class="material-symbols-outlined text-primary mb-1">local_shipping</span>
                    <p class="text-[10px] font-bold text-zinc-500 uppercase">Fast Delivery</p>
                </div>
                <div class="bg-white rounded-2xl p-4 text-center shadow-sm border border-zinc-50">
                    <span class="material-symbols-outlined text-primary mb-1">replay</span>
                    <p class="text-[10px] font-bold text-zinc-500 uppercase">Easy Returns</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Suggestions Section -->
    <section class="mb-20">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-2xl font-extrabold">You might also like</h2>
                <p class="text-zinc-400 text-sm mt-1">Based on your selection</p>
            </div>
            <a href="/index/" class="text-primary font-bold text-sm hover:underline flex items-center gap-1">
                View All <span class="material-symbols-outlined text-sm">arrow_forward</span>
            </a>
        </div>
        <div id="suggestionsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <div class="skeleton h-56"></div><div class="skeleton h-56"></div><div class="skeleton h-56"></div><div class="skeleton h-56"></div>
        </div>
    </section>
</main>

<script>
const PRODUCT_ID = '{{ product_id }}';
let quantity = 1;
let productData = null;

function getCookie(name) {
    let v = null;
    document.cookie.split(';').forEach(c => { c = c.trim(); if (c.startsWith(name + '=')) v = decodeURIComponent(c.substring(name.length + 1)); });
    return v;
}

function changeQty(delta) {
    quantity = Math.max(1, quantity + delta);
    document.getElementById('qtyValue').textContent = quantity;
}

function showSuccess(msg) {
    const toast = document.getElementById('successToast');
    toast.textContent = msg;
    toast.classList.remove('hidden');
    setTimeout(() => toast.classList.add('hidden'), 3000);
}

function generateSuggestionCard(p) {
    const dynamicPrice = p.dynamic_price || Math.round(p.price * (1 - p.discount / 100));
    const imgSrc = p.image_url || 'https://cdn-icons-png.flaticon.com/512/3081/3081951.png';
    const effDiscount = p.effective_discount || p.discount || 0;
    return `
        <div class="suggestion-card bg-white p-4 rounded-3xl shadow-sm" onclick="window.location.href='/product/${p._id}/'">
            <img loading="lazy" src="${imgSrc}" class="w-full aspect-square object-contain rounded-2xl mb-4 bg-zinc-50 p-4">
            <h3 class="font-bold text-sm">${p.name}</h3>
            <p class="text-xs text-zinc-400 mb-2">${p.category} • ${p.weight || ''}</p>
            <div class="flex justify-between items-center">
                <span class="font-extrabold text-emerald-800">₹${dynamicPrice}</span>
                ${effDiscount > 0 ? `<span class="text-xs line-through text-zinc-400">₹${p.price}</span>` : ''}
            </div>
        </div>`;
}

async function addToCart() {
    if (!productData) return;
    const token = localStorage.getItem('token') || '';
    const btn = document.getElementById('addToCartBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>';

    try {
        const finalPrice = Math.round(productData.price * (1 - productData.discount / 100));
        const res = await fetch('/api/planner/add-to-cart/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
            body: JSON.stringify({
                items: [{
                    product_id: PRODUCT_ID,
                    product_name: productData.name,
                    quantity: quantity,
                    price: finalPrice,
                    image_url: productData.image_url || '',
                }],
                token: token,
            })
        });
        const data = await res.json();
        if (data.success) {
            _navSetCartCount(data.cart_count);
            _navRefreshCart();
            showSuccess(`✅ ${productData.name} (×${quantity}) added to cart!`);
        }
    } catch (err) { console.error(err); }

    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-outlined">shopping_cart</span> Add to Cart';
}

async function loadProduct() {
    try {
        const res = await fetch(`/api/auth/products/${PRODUCT_ID}/`);
        const p = await res.json();
        if (p.error) { window.location.href = '/index/'; return; }
        productData = p;

        // Use dynamic price if available, else calculate from static discount
        const dynamicPrice = p.dynamic_price || Math.round(p.price * (1 - p.discount / 100));
        const savings = p.savings || Math.max(0, p.price - dynamicPrice);
        const effDiscount = p.effective_discount || p.discount || 0;

        document.title = `${p.name} | BasketIQ`;
        document.getElementById('breadcrumbCategory').textContent = p.category || 'Products';
        document.getElementById('breadcrumbProduct').textContent = p.name;
        document.getElementById('productName').textContent = p.name;
        document.getElementById('productCategory').textContent = p.category || '';
        document.getElementById('productWeight').textContent = `Unit: ${p.unit || ''} • Weight: ${p.weight || ''}`;
        document.getElementById('productFinalPrice').textContent = `₹${dynamicPrice}`;

        // Image
        const img = document.getElementById('productImage');
        img.src = p.image_url || 'https://cdn-icons-png.flaticon.com/512/3081/3081951.png';
        img.alt = p.name;
        img.classList.remove('hidden');
        document.getElementById('productImageSkeleton').classList.add('hidden');

        // Discount & savings
        if (effDiscount > 0 || savings > 0) {
            document.getElementById('discountBadge').classList.remove('hidden');
            document.getElementById('discountPercent').textContent = Math.round(effDiscount);
            document.getElementById('productOriginalPrice').textContent = `₹${p.price}`;
            document.getElementById('productOriginalPrice').classList.remove('hidden');
            document.getElementById('savingsTag').textContent = `You save ₹${savings}`;
            document.getElementById('savingsTag').classList.remove('hidden');
        }

        // Dynamic pricing factors
        if (p.pricing_factors && p.pricing_factors.length > 0) {
            const factorsHtml = p.pricing_factors.map(f => {
                const [label, pct] = f;
                const color = pct < 0 ? 'emerald' : 'amber';
                const sign = pct > 0 ? '+' : '';
                return `<span class="px-3 py-1 bg-${color}-50 text-${color}-700 text-xs rounded-full font-bold">⚡ ${label} (${sign}${pct}%)</span>`;
            }).join('');
            document.getElementById('keywordsContainer').insertAdjacentHTML('beforeend',
                `<div class="flex flex-wrap gap-2 mt-2 pt-2 border-t border-zinc-100 w-full"><span class="text-[10px] font-bold text-zinc-400 uppercase w-full mb-1">Smart Pricing Active</span>${factorsHtml}</div>`
            );
        }

        // Keywords
        if (p.keywords && p.keywords.length) {
            const kwHtml = p.keywords
                .map(k => `<span class="px-3 py-1 bg-zinc-100 text-zinc-600 text-xs rounded-full font-medium">${k}</span>`)
                .join('');
            document.getElementById('keywordsContainer').innerHTML = kwHtml + document.getElementById('keywordsContainer').innerHTML;
        }
    } catch (err) { console.error(err); }
}

async function loadSuggestions() {
    try {
        const res = await fetch(`/api/auth/products/${PRODUCT_ID}/suggestions/`);
        const suggestions = await res.json();
        const grid = document.getElementById('suggestionsGrid');
        grid.innerHTML = suggestions.length
            ? suggestions.map(generateSuggestionCard).join('')
            : '<p class="col-span-4 text-zinc-400 italic text-center py-8">No suggestions available</p>';
    } catch (err) { console.error(err); }
}

// Init
loadProduct();
loadSuggestions();
</script>
</body>
</html>
