<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>My Orders | BasketIQ</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>tailwind.config={theme:{extend:{colors:{primary:"#006036","primary-container":"#1b7a4a",background:"#f9f9f6"}}}}</script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f9f9f6; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        @keyframes sk { 0%{background-color:#e5e7eb} 50%{background-color:#f3f4f6} 100%{background-color:#e5e7eb} }
        .skeleton { animation: sk 1.5s infinite ease-in-out; border-radius: 0.75rem; }
    </style>
</head>
<body class="bg-background pt-24 pb-28">

<script>
    const token = localStorage.getItem("token");
    if (!token) { window.location.href = "/login/"; }
</script>

{% include '_navbar.html' %}

<main class="max-w-4xl mx-auto px-6">
    <div class="mb-10">
        <h1 class="text-3xl font-extrabold text-zinc-900">My Orders</h1>
        <p class="text-zinc-500 text-sm mt-1" id="ordersSubtitle">Loading your order history...</p>
    </div>

    <!-- Skeleton Loader -->
    <div id="ordersSkeleton" class="space-y-6">
        <div class="skeleton h-40 w-full"></div>
        <div class="skeleton h-40 w-full"></div>
        <div class="skeleton h-40 w-full"></div>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="hidden text-center py-20">
        <span class="material-symbols-outlined text-6xl text-zinc-300 mb-4" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
        <h2 class="text-2xl font-extrabold text-zinc-400 mb-2">No orders yet</h2>
        <p class="text-zinc-400 mb-8">Your order history will appear here once you place your first order.</p>
        <a href="/aiGroceryPlanner/" class="px-8 py-4 bg-primary text-white font-bold rounded-2xl hover:bg-emerald-800 transition-colors shadow-lg">Plan Your Groceries</a>
    </div>

    <!-- Orders List -->
    <div id="ordersList" class="hidden space-y-6"></div>
</main>

<script>
async function loadOrders() {
    try {
        const res = await fetch('/api/orders/orders/', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const orders = await res.json();

        document.getElementById('ordersSkeleton').classList.add('hidden');

        if (!orders || orders.length === 0 || orders.error) {
            document.getElementById('emptyState').classList.remove('hidden');
            document.getElementById('ordersSubtitle').textContent = 'No orders found';
            return;
        }

        document.getElementById('ordersSubtitle').textContent = `${orders.length} order${orders.length > 1 ? 's' : ''} placed`;
        document.getElementById('ordersList').classList.remove('hidden');

        const container = document.getElementById('ordersList');
        container.innerHTML = orders.map(order => {
            const date = order.date ? new Date(order.date).toLocaleDateString('en-IN', {
                year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
            }) : 'Unknown date';

            const statusColors = {
                'Confirmed': 'bg-emerald-100 text-emerald-700',
                'Delivered': 'bg-blue-100 text-blue-700',
                'Cancelled': 'bg-red-100 text-red-700',
                'In Transit': 'bg-amber-100 text-amber-700',
            };
            const statusClass = statusColors[order.status] || 'bg-zinc-100 text-zinc-600';

            const itemsHtml = (order.items || []).map(item => {
                const imgSrc = item.image_url || 'https://cdn-icons-png.flaticon.com/512/3081/3081951.png';
                return `
                    <div class="flex items-center gap-3 py-2">
                        <div class="w-10 h-10 rounded-lg bg-zinc-50 flex items-center justify-center shrink-0 p-1">
                            <img src="${imgSrc}" class="w-6 h-6 object-contain"/>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-semibold text-zinc-800 truncate">${item.name}</p>
                            <p class="text-xs text-zinc-400">Qty: ${item.quantity} × ₹${item.price}</p>
                        </div>
                        <p class="text-sm font-bold text-zinc-700 shrink-0">₹${item.line_total || (item.quantity * item.price)}</p>
                    </div>`;
            }).join('');

            return `
                <div class="bg-white rounded-[2rem] shadow-sm border border-zinc-50 overflow-hidden hover:shadow-md transition-all">
                    <div class="px-6 py-5 flex justify-between items-center border-b border-zinc-50">
                        <div>
                            <div class="flex items-center gap-3">
                                <span class="material-symbols-outlined text-primary">package_2</span>
                                <h3 class="font-extrabold text-zinc-900">${order.order_id}</h3>
                                <span class="px-3 py-1 ${statusClass} text-[10px] font-bold rounded-full uppercase tracking-wide">${order.status}</span>
                            </div>
                            <p class="text-xs text-zinc-400 mt-1 ml-9">${date}</p>
                        </div>
                        <p class="text-xl font-extrabold text-primary">₹${order.total_amount}</p>
                    </div>
                    <div class="px-6 py-4 divide-y divide-zinc-50">${itemsHtml}</div>
                    <div class="px-6 py-4 bg-zinc-50/50 flex justify-between items-center text-sm">
                        <span class="text-zinc-500">${(order.items || []).length} item${(order.items || []).length > 1 ? 's' : ''}</span>
                        <span class="font-bold text-zinc-700">Total: ₹${order.total_amount}</span>
                    </div>
                </div>`;
        }).join('');

    } catch (err) {
        document.getElementById('ordersSkeleton').classList.add('hidden');
        document.getElementById('emptyState').classList.remove('hidden');
        document.getElementById('ordersSubtitle').textContent = 'Could not load orders';
        console.error(err);
    }
}

loadOrders();
</script>
</body>
</html>
