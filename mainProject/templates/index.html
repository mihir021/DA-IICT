<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Home | BasketIQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>tailwind.config={theme:{extend:{colors:{primary:"#006036",background:"#f9f9f6"}}}}</script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f9f9f6; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes sk { 0%{background-color:#e5e7eb} 50%{background-color:#f3f4f6} 100%{background-color:#e5e7eb} }
        .skeleton { animation: sk 1.5s infinite ease-in-out; border-radius: 1rem; }
        @keyframes slideDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
        .animate-slide-down { animation: slideDown 0.5s ease-out; }
        .product-card { cursor: pointer; transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,96,54,0.1); }
    </style>
</head>
<body class="bg-background pt-24 pb-28 px-6">

<script>
    const token = localStorage.getItem("token");
    if (!token) { window.location.href = "/login/"; }
</script>

{% include '_navbar.html' %}

<!-- Welcome Toast (shown after signup) -->
<div id="welcomeToast" class="hidden fixed top-24 left-1/2 -translate-x-1/2 z-[60] bg-emerald-50 border border-emerald-200 text-emerald-800 px-8 py-4 rounded-2xl shadow-xl text-center animate-slide-down max-w-lg">
    <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">celebration</span>
        <p class="font-bold" id="welcomeToastText">Welcome to BasketIQ!</p>
    </div>
</div>

<main class="max-w-7xl mx-auto">
    <h1 id="welcomeText" class="text-3xl font-extrabold mb-8 italic">Welcome!</h1>

    <!-- Search Bar -->
    <div class="relative max-w-lg mb-8">
        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400">search</span>
        <input type="text" id="searchInput" placeholder="Search fruits, milk, spices..."
            class="w-full pl-12 pr-10 p-4 rounded-2xl bg-white border-zinc-200 focus:ring-2 focus:ring-emerald-500 border-none shadow-sm">
        <button id="clearSearchBtn" onclick="clearSearch()" class="hidden absolute right-3 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-zinc-600">
            <span class="material-symbols-outlined text-sm">close</span>
        </button>
    </div>

    <!-- Category Filters -->
    <div class="flex gap-3 mb-12 overflow-x-auto no-scrollbar pb-2">
        <button class="cat-btn px-6 py-2.5 bg-emerald-700 text-white rounded-full font-bold shadow-sm whitespace-nowrap transition-all" onclick="handleCategory('All', this)">All</button>
        <button class="cat-btn px-6 py-2.5 bg-white rounded-full font-bold shadow-sm whitespace-nowrap transition-all hover:bg-emerald-50" onclick="handleCategory('Fruits', this)">🍎 Fruits</button>
        <button class="cat-btn px-6 py-2.5 bg-white rounded-full font-bold shadow-sm whitespace-nowrap transition-all hover:bg-emerald-50" onclick="handleCategory('Dairy', this)">🥛 Dairy</button>
        <button class="cat-btn px-6 py-2.5 bg-white rounded-full font-bold shadow-sm whitespace-nowrap transition-all hover:bg-emerald-50" onclick="handleCategory('Pulses', this)">🫘 Pulses</button>
        <button class="cat-btn px-6 py-2.5 bg-white rounded-full font-bold shadow-sm whitespace-nowrap transition-all hover:bg-emerald-50" onclick="handleCategory('Spices', this)">🌶️ Spices</button>
        <button class="cat-btn px-6 py-2.5 bg-white rounded-full font-bold shadow-sm whitespace-nowrap transition-all hover:bg-emerald-50" onclick="handleCategory('Vegetables', this)">🥬 Vegetables</button>
        <button class="cat-btn px-6 py-2.5 bg-white rounded-full font-bold shadow-sm whitespace-nowrap transition-all hover:bg-emerald-50" onclick="handleCategory('Oil', this)">🫒 Oil & Ghee</button>
        <button class="cat-btn px-6 py-2.5 bg-white rounded-full font-bold shadow-sm whitespace-nowrap transition-all hover:bg-emerald-50" onclick="handleCategory('Flour', this)">🌾 Flour</button>
        <button class="cat-btn px-6 py-2.5 bg-white rounded-full font-bold shadow-sm whitespace-nowrap transition-all hover:bg-emerald-50" onclick="handleCategory('Pantry', this)">🏪 Pantry</button>
        <button class="cat-btn px-6 py-2.5 bg-white rounded-full font-bold shadow-sm whitespace-nowrap transition-all hover:bg-emerald-50" onclick="handleCategory('Grains', this)">🍚 Grains</button>
    </div>

    <!-- Best Sellers -->
    <section class="mb-12" id="bestSellerSection">
        <h2 class="text-xl font-bold mb-6 text-emerald-900">⭐ Best Sellers</h2>
        <div id="bestSellerGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <div class="skeleton h-56"></div><div class="skeleton h-56"></div><div class="skeleton h-56"></div><div class="skeleton h-56"></div>
        </div>
    </section>

    <!-- Offers -->
    <section class="mb-12 bg-amber-50 p-6 rounded-3xl" id="offerSection">
        <h2 class="text-xl font-bold mb-6 text-amber-900">🔥 Today's Offers</h2>
        <div id="offerGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <div class="skeleton h-56"></div><div class="skeleton h-56"></div><div class="skeleton h-56"></div><div class="skeleton h-56"></div>
        </div>
    </section>

    <!-- All Products -->
    <section>
        <h2 id="gridTitle" class="text-xl font-bold mb-6">Our Collection</h2>
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <div class="skeleton h-56"></div><div class="skeleton h-56"></div><div class="skeleton h-56"></div><div class="skeleton h-56"></div>
        </div>
    </section>
</main>

<script>
const BASE_URL = '';
let currentCat = 'All';
let searchDebounce = null;

function generateCard(p) {
    const dynamicPrice = p.dynamic_price || (p.price - (p.price * p.discount / 100));
    const imgSrc = p.image_url || 'https://cdn-icons-png.flaticon.com/512/3081/3081951.png';
    const productId = p._id;
    const hasDynamic = p.dynamic_adjustment && p.dynamic_adjustment !== 0;
    const effDiscount = p.effective_discount || p.discount || 0;
    return `
        <div class="product-card bg-white p-4 rounded-3xl shadow-sm" onclick="window.location.href='/product/${productId}/'">
            ${hasDynamic ? `<div class="flex justify-end mb-1"><span class="text-[9px] px-2 py-0.5 bg-amber-100 text-amber-700 font-bold rounded-full flex items-center gap-1">⚡ Smart Price</span></div>` : ''}
            <img loading="lazy" src="${imgSrc}" class="w-full aspect-square object-contain rounded-2xl mb-3 bg-zinc-50 p-4">
            <h3 class="font-bold text-sm">${p.name}</h3>
            <p class="text-xs text-zinc-400 mb-2">${p.category} • ${p.weight || ''}</p>
            <div class="flex justify-between items-center">
                <span class="font-extrabold text-emerald-800">₹${dynamicPrice}</span>
                ${effDiscount > 0 ? `<div class="flex items-center gap-1.5"><span class="text-xs line-through text-zinc-400">₹${p.price}</span><span class="text-[9px] px-1.5 py-0.5 bg-emerald-100 text-emerald-700 font-bold rounded">${Math.round(effDiscount)}% off</span></div>` : ''}
            </div>
        </div>`;
}

function clearSearch() {
    document.getElementById('searchInput').value = '';
    document.getElementById('clearSearchBtn').classList.add('hidden');
    currentCat = 'All';
    // reset category buttons
    document.querySelectorAll('.cat-btn').forEach((b, i) => {
        b.classList.remove('bg-emerald-700', 'text-white');
        b.classList.add('bg-white');
    });
    document.querySelector('.cat-btn').classList.remove('bg-white');
    document.querySelector('.cat-btn').classList.add('bg-emerald-700', 'text-white');
    renderAll();
    // Show best sellers and offers again
    document.getElementById('bestSellerSection').classList.remove('hidden');
    document.getElementById('offerSection').classList.remove('hidden');
    document.getElementById('gridTitle').textContent = 'Our Collection';
}

async function renderAll() {
    const query = document.getElementById('searchInput').value.trim();

    // Show/hide clear button
    const clearBtn = document.getElementById('clearSearchBtn');
    if (query) { clearBtn.classList.remove('hidden'); } else { clearBtn.classList.add('hidden'); }

    // When searching or filtering, hide best sellers / offers
    if (query || currentCat !== 'All') {
        document.getElementById('bestSellerSection').classList.add('hidden');
        document.getElementById('offerSection').classList.add('hidden');
        document.getElementById('gridTitle').textContent = currentCat !== 'All'
            ? `${currentCat} Products`
            : query ? `Search results for "${query}"` : 'Our Collection';
    } else {
        document.getElementById('bestSellerSection').classList.remove('hidden');
        document.getElementById('offerSection').classList.remove('hidden');
        document.getElementById('gridTitle').textContent = 'Our Collection';
    }

    try {
        const catParam = currentCat !== 'All' ? currentCat : '';
        const res = await fetch(`${BASE_URL}/api/auth/products/?search=${encodeURIComponent(query)}&category=${encodeURIComponent(catParam)}`);
        const prods = await res.json();
        document.getElementById('productGrid').innerHTML = prods.length
            ? prods.map(generateCard).join('')
            : '<p class="col-span-4 text-center text-zinc-400 py-10 italic">No products found</p>';
    } catch (err) {
        console.error(err);
        document.getElementById('productGrid').innerHTML = '<p class="col-span-4 text-center text-red-400 py-10">Connection error. Please try again.</p>';
    }
}

function handleCategory(cat, btn) {
    currentCat = cat;
    document.querySelectorAll('.cat-btn').forEach(b => {
        b.classList.remove('bg-emerald-700', 'text-white');
        b.classList.add('bg-white');
    });
    btn.classList.remove('bg-white');
    btn.classList.add('bg-emerald-700', 'text-white');
    renderAll();
}

// Debounced search input
document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(renderAll, 300);
});

window.onload = async () => {
    const name = localStorage.getItem('user_name') || "Guest";
    document.getElementById('welcomeText').innerText = `What's on the list, ${name}?`;

    // Show welcome toast for new signups
    if (localStorage.getItem('just_signed_up') === 'true') {
        localStorage.removeItem('just_signed_up');
        const toast = document.getElementById('welcomeToast');
        document.getElementById('welcomeToastText').textContent = `Welcome to BasketIQ, ${name}! 🎉 Your account is ready.`;
        toast.classList.remove('hidden');
        setTimeout(() => toast.classList.add('hidden'), 6000);
    }

    try {
        const best = await fetch(`${BASE_URL}/api/auth/products/best-sellers/`).then(r => r.json());
        document.getElementById('bestSellerGrid').innerHTML = best.length
            ? best.map(generateCard).join('')
            : '<p class="col-span-4 text-zinc-400 italic">No best sellers found</p>';

        const offers = await fetch(`${BASE_URL}/api/auth/products/offers/`).then(r => r.json());
        document.getElementById('offerGrid').innerHTML = offers.length
            ? offers.map(generateCard).join('')
            : '<p class="col-span-4 text-zinc-400 italic">No offers available</p>';

        renderAll();
    } catch (err) { console.error("Connection error:", err); }
};
</script>
</body>
</html>
