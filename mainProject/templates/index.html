<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Home | BasketIQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f9f9f6;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="pt-24 px-6 pb-20">
    <!-- Auth Check (MUST BE AT THE TOP) -->
    <script>
        const token = localStorage.getItem("token");
        if (!token) {
            alert("Please login first");
            window.location.href = "login.html";
        }
    </script>

    <header class="fixed top-0 left-0 w-full bg-white/80 backdrop-blur-md z-50 border-b border-zinc-100">
        <nav class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <h1 class="text-xl font-extrabold text-emerald-800">BasketIQ</h1>
            <div class="flex gap-4">
                <a href="profile.html" class="font-bold text-emerald-700">Profile</a>
                <button onclick="localStorage.clear(); window.location.href='login.html'"
                    class="text-red-500 font-bold">Logout</button>
            </div>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto">
        <!-- A. Welcome -->
        <h1 id="welcomeText" class="text-3xl font-extrabold mb-8 italic">Welcome!</h1>

        <!-- B. Search Bar -->
        <input type="text" id="searchInput" oninput="renderAll()" placeholder="Search fruits, milk..."
            class="w-full max-w-lg mb-8 p-4 rounded-2xl bg-white border-zinc-200 focus:ring-2 focus:ring-emerald-500 border-none shadow-sm">

        <!-- C. Category Filters -->
        <div class="flex gap-3 mb-12 overflow-x-auto no-scrollbar">
            <button class="px-6 py-2 bg-emerald-700 text-white rounded-full font-bold"
                onclick="handleCategory('All', this)">All</button>
            <button class="px-6 py-2 bg-white rounded-full font-bold shadow-sm"
                onclick="handleCategory('Fruits', this)">Fruits</button>
            <button class="px-6 py-2 bg-white rounded-full font-bold shadow-sm"
                onclick="handleCategory('Dairy', this)">Dairy</button>
            <button class="px-6 py-2 bg-white rounded-full font-bold shadow-sm"
                onclick="handleCategory('Snacks', this)">Snacks</button>
        </div>

        <!-- D. Dynamic Grids -->
        <section class="mb-12">
            <h2 class="text-xl font-bold mb-6 text-emerald-900">⭐ Best Sellers</h2>
            <div id="bestSellerGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </section>

        <section class="mb-12 bg-amber-50 p-6 rounded-3xl">
            <h2 class="text-xl font-bold mb-6 text-amber-900">🔥 Today's Offers</h2>
            <div id="offerGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </section>

        <section>
            <h2 id="gridTitle" class="text-xl font-bold mb-6">Our Collection</h2>
            <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </section>
    </main>

    <script src="js/api.js"></script>
    <script>
        let currentCat = 'All';

        function generateCard(p) {
            const finalPrice = p.price - (p.price * p.discount / 100);
            return `
                <div class="bg-white p-4 rounded-3xl shadow-sm hover:shadow-md transition-all">
                    <img src="${p.image_url}" class="w-full aspect-square object-cover rounded-2xl mb-4">
                    <h3 class="font-bold">${p.name}</h3>
                    <p class="text-xs text-zinc-400 mb-2">${p.category}</p>
                    <div class="flex justify-between items-center">
                        <span class="font-extrabold text-emerald-800">₹${finalPrice.toFixed(0)}</span>
                        <button onclick="console.log('Added ${p.name}')" class="bg-emerald-50 text-emerald-700 w-8 h-8 rounded-full font-bold">+</button>
                    </div>
                </div>
            `;
        }

        async function renderAll() {
            const query = document.getElementById('searchInput').value;
            const prods = await api.fetchProducts(query, currentCat);
            document.getElementById('productGrid').innerHTML = prods.map(generateCard).join('');
        }

        async function handleCategory(cat, btn) {
            currentCat = cat;
            renderAll();
        }

        // --- Updated window.onload logic ---
        window.onload = async () => {
            // 1. Auth Check
            const token = localStorage.getItem("token");
            if (!token) {
                console.warn("No token found, redirecting...");
                window.location.href = "login.html";
                return;
            }

            // 2. Personalization
            const name = localStorage.getItem('user_name') || "Guest";
            document.getElementById('welcomeText').innerText = `What's on the list, ${name}?`;

            // 3. Load Dynamic Data
            try {
                const best = await api.getBestSellers();
                document.getElementById('bestSellerGrid').innerHTML = best.map(generateCard).join('');

                const offers = await api.getOffers();
                document.getElementById('offerGrid').innerHTML = offers.map(generateCard).join(''); // Fixed typo from generateHTML to generateCard

                renderAll(); // Load main Collection
            } catch (err) {
                console.error("Connection lost:", err);
            }
        };

    </script>
</body>

</html>
