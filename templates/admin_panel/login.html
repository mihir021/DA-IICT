{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BasketIQ Admin — Login</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0D1A12;--surface:#122318;--border:#1E3528;--gold:#C8A84B;--text:#F5F0E8;--text-muted:#8A9E90;--danger:#C0392B;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.04;pointer-events:none;}
.login-wrap{width:100%;max-width:400px;padding:20px;}
.login-card{background:rgba(18,35,24,.9);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:16px;padding:44px 40px;box-shadow:0 0 0 1px rgba(200,168,75,.1),0 20px 60px rgba(0,0,0,.5);}
.logo{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;margin-bottom:4px;}
.logo span{color:var(--gold);}
.subtitle{font-size:12px;color:var(--text-muted);letter-spacing:.05em;margin-bottom:36px;}
.field{margin-bottom:18px;}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;}
.field input{width:100%;background:rgba(18,35,24,.6);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-size:14px;outline:none;transition:border .2s;}
.field input:focus{border-color:var(--gold);}
.field input::placeholder{color:rgba(138,158,144,.5);}
.btn-login{width:100%;background:var(--gold);color:#0D1A12;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-login:hover{background:#D4AF6A;box-shadow:0 4px 20px rgba(200,168,75,.3);}
.error{background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.3);border-radius:8px;padding:10px 14px;color:var(--danger);font-size:13px;margin-bottom:16px;}
.hint{text-align:center;font-size:11px;color:var(--text-muted);margin-top:20px;}
.hint span{color:var(--gold);}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="logo">Basket<span>IQ</span></div>
    <div class="subtitle">Admin Control Center &mdash; Authorized Access Only</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/admin-panel/login/">
      {% csrf_token %}
      <div class="field">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="admin@basketiq.com" required autofocus>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">Sign In to Admin</button>
    </form>

    <div class="hint">Protected route — <span>staff only</span>. Unauthorized access is logged.</div>
  </div>
</div>
</body>
</html>
