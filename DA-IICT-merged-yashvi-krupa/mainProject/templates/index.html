<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Home | BasketIQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>tailwind.config={theme:{extend:{colors:{primary:"#006036",background:"#f9f9f6"}}}}</script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f9f9f6; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes sk { 0%{background-color:#e5e7eb} 50%{background-color:#f3f4f6} 100%{background-color:#e5e7eb} }
        .skeleton { animation: sk 1.5s infinite ease-in-out; border-radius: 1rem; }
        @keyframes slideDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
        .animate-slide-down { animation: slideDown 0.5s ease-out; }
    </style>
</head>
<body class="bg-background pt-24 pb-28 px-6">

<script>
    const token = localStorage.getItem("token");
    if (!token) { window.location.href = "/login/"; }
</script>

{% include '_navbar.html' %}

<!-- Welcome Toast (shown after signup) -->
<div id="welcomeToast" class="hidden fixed top-24 left-1/2 -translate-x-1/2 z-[60] bg-emerald-50 border border-emerald-200 text-emerald-800 px-8 py-4 rounded-2xl shadow-xl text-center animate-slide-down max-w-lg">
    <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">celebration</span>
        <p class="font-bold" id="welcomeToastText">Welcome to BasketIQ!</p>
    </div>
</div>

<main class="max-w-7xl mx-auto">
    <h1 id="welcomeText" class="text-3xl font-extrabold mb-8 italic">Welcome!</h1>

    <!-- Search Bar -->
    <input type="text" id="searchInput" oninput="renderAll()" placeholder="Search fruits, milk, spices..."
        class="w-full max-w-lg mb-8 p-4 rounded-2xl bg-white border-zinc-200 focus:ring-2 focus:ring-emerald-500 border-none shadow-sm">

    <!-- Category Filters -->
    <div class="flex gap-3 mb-12 overflow-x-auto no-scrollbar">
        <button class="cat-btn px-6 py-2 bg-emerald-700 text-white rounded-full font-bold" onclick="handleCategory('All', this)">All</button>
        <button class="cat-btn px-6 py-2 bg-white rounded-full font-bold shadow-sm" onclick="handleCategory('Fruits', this)">Fruits</button>
        <button class="cat-btn px-6 py-2 bg-white rounded-full font-bold shadow-sm" onclick="handleCategory('Dairy', this)">Dairy</button>
        <button class="cat-btn px-6 py-2 bg-white rounded-full font-bold shadow-sm" onclick="handleCategory('Pulses', this)">Pulses</button>
        <button class="cat-btn px-6 py-2 bg-white rounded-full font-bold shadow-sm" onclick="handleCategory('Spices', this)">Spices</button>
        <button class="cat-btn px-6 py-2 bg-white rounded-full font-bold shadow-sm" onclick="handleCategory('Vegetables', this)">Vegetables</button>
        <button class="cat-btn px-6 py-2 bg-white rounded-full font-bold shadow-sm" onclick="handleCategory('Oil', this)">Oil & Ghee</button>
        <button class="cat-btn px-6 py-2 bg-white rounded-full font-bold shadow-sm" onclick="handleCategory('Flour', this)">Flour</button>
    </div>

    <!-- Best Sellers -->
    <section class="mb-12">
        <h2 class="text-xl font-bold mb-6 text-emerald-900">⭐ Best Sellers</h2>
        <div id="bestSellerGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <div class="skeleton h-56"></div><div class="skeleton h-56"></div><div class="skeleton h-56"></div><div class="skeleton h-56"></div>
        </div>
    </section>

    <!-- Offers -->
    <section class="mb-12 bg-amber-50 p-6 rounded-3xl">
        <h2 class="text-xl font-bold mb-6 text-amber-900">🔥 Today's Offers</h2>
        <div id="offerGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <div class="skeleton h-56"></div><div class="skeleton h-56"></div><div class="skeleton h-56"></div><div class="skeleton h-56"></div>
        </div>
    </section>

    <!-- Sales + Discounts -->
    <section>
        <h2 id="gridTitle" class="text-xl font-bold mb-2">Sales, Offers & Discounts</h2>
        <p class="text-sm text-zinc-500 mb-6">Handpicked deals across groceries with live discounted pricing.</p>
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <div class="skeleton h-56"></div><div class="skeleton h-56"></div><div class="skeleton h-56"></div><div class="skeleton h-56"></div>
        </div>
    </section>
</main>

<script>
const BASE_URL = '';
let currentCat = 'All';

function generateCard(p) {
    const finalPrice = p.price - (p.price * p.discount / 100);
    const imgSrc = p.image_url || `https://source.unsplash.com/900x900/?${encodeURIComponent((p.name || 'grocery') + ',fresh grocery')}`;
    return `
        <div class="bg-white rounded-3xl overflow-hidden border border-zinc-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300">
            <div class="relative">
                <img src="${imgSrc}" class="w-full aspect-square object-cover" loading="lazy" referrerpolicy="no-referrer">
                ${p.discount > 0 ? `<span class="absolute top-3 left-3 px-2.5 py-1 rounded-full bg-rose-600 text-white text-[11px] font-bold">${p.discount}% OFF</span>` : ''}
            </div>
            <div class="p-4">
            <h3 class="font-bold text-zinc-900">${p.name}</h3>
            <p class="text-xs text-zinc-500 mb-2">${p.category} • ${p.weight || ''}</p>
            <div class="flex justify-between items-center">
                <span class="font-extrabold text-emerald-800">₹${finalPrice.toFixed(0)}</span>
                ${p.discount > 0 ? `<span class="text-xs line-through text-zinc-400">₹${p.price}</span>` : ''}
            </div>
            </div>
        </div>`;
}

async function renderAll() {
    const query = document.getElementById('searchInput').value;
    try {
        const res = await fetch(`${BASE_URL}/api/auth/products/?search=${query}&category=${currentCat}`);
        const prods = await res.json();
        const saleItems = prods.filter(p => (p.discount || 0) > 0);
        document.getElementById('productGrid').innerHTML = saleItems.length
            ? saleItems.map(generateCard).join('')
            : '<p class="col-span-4 text-center text-zinc-400 py-10 italic">No products found</p>';
    } catch (err) { console.error(err); }
}

function handleCategory(cat, btn) {
    currentCat = cat;
    document.querySelectorAll('.cat-btn').forEach(b => {
        b.classList.remove('bg-emerald-700', 'text-white');
        b.classList.add('bg-white');
    });
    btn.classList.remove('bg-white');
    btn.classList.add('bg-emerald-700', 'text-white');
    renderAll();
}

window.onload = async () => {
    const name = localStorage.getItem('user_name') || "Guest";
    document.getElementById('welcomeText').innerText = `What's on the list, ${name}?`;

    // Show welcome toast for new signups
    if (localStorage.getItem('just_signed_up') === 'true') {
        localStorage.removeItem('just_signed_up');
        const toast = document.getElementById('welcomeToast');
        document.getElementById('welcomeToastText').textContent = `Welcome to BasketIQ, ${name}! 🎉 Your account is ready.`;
        toast.classList.remove('hidden');
        setTimeout(() => toast.classList.add('hidden'), 6000);
    }

    try {
        const best = await fetch(`${BASE_URL}/api/auth/products/best-sellers/`).then(r => r.json());
        document.getElementById('bestSellerGrid').innerHTML = best.map(generateCard).join('');

        const offers = await fetch(`${BASE_URL}/api/auth/products/offers/`).then(r => r.json());
        document.getElementById('offerGrid').innerHTML = offers.map(generateCard).join('');

        renderAll();
    } catch (err) { console.error("Connection error:", err); }
};
</script>
</body>
</html>
