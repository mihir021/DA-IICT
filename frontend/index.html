<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>BasketIQ | Your Smart Grocery Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f9f9f6; }
        .emerald-gradient { background: linear-gradient(135deg, #006036 0%, #1b7a4a 100%); }
    </style>
</head>
<body class="min-h-screen">
    <!-- Navbar -->
    <nav class="flex justify-between items-center max-w-7xl mx-auto px-6 h-24">
        <div class="text-2xl font-extrabold text-emerald-900 flex items-center gap-2">
            <span class="text-3xl">🛒</span> BasketIQ
        </div>
        <div class="flex items-center gap-6">
            <a href="login.html" class="font-bold text-zinc-600 hover:text-emerald-700">Login</a>
            <a href="signup.html" class="emerald-gradient text-white px-8 py-3 rounded-full font-bold shadow-lg shadow-emerald-900/10">Sign Up</a>
        </div>
    </nav>

    <!-- Hero -->
    <main class="max-w-7xl mx-auto px-6 pt-20 pb-32 text-center">
        <h1 class="text-6xl md:text-8xl font-extrabold tracking-tight text-zinc-900 mb-8">
            The grocery store <br/> <span class="text-emerald-700 italic">that thinks.</span>
        </h1>
        <p class="text-xl text-zinc-500 max-w-2xl mx-auto mb-12">
            AI-powered predictions, personalized pricing, and seamless smart-cart integration. Welcome to the future of kitchens.
        </p>
        <div class="flex flex-col sm:flex-row justify-center gap-6">
            <a href="home.html" class="emerald-gradient text-white px-12 py-5 rounded-full font-extrabold text-xl transition-transform hover:scale-105">
                Start Shopping
            </a>
            <button class="font-bold text-emerald-700 px-12 py-5 rounded-full border-2 border-emerald-700/20 hover:bg-emerald-50 transition-colors">
                Learn More
            </button>
        </div>
    </main>
</body>
</html>
