<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Signup | BasketIQ</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>tailwind.config={theme:{extend:{colors:{primary:"#006036","primary-container":"#1b7a4a",background:"#f9f9f6"}}}}</script>
    <style>body{font-family:'Plus Jakarta Sans',sans-serif;background-color:#f9f9f6}.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}</style>
</head>
<body class="bg-background pt-24 pb-28">

{% include '_navbar.html' %}

<main class="min-h-[70vh] flex items-center justify-center px-6">
    <div class="max-w-md w-full bg-white p-10 rounded-[2.5rem] shadow-xl border border-zinc-100">
        <h1 class="text-3xl font-extrabold text-center mb-8">Create Account</h1>

        <form id="signupForm" class="space-y-4">
            <input type="text" id="name" placeholder="Full Name" required class="w-full px-5 py-4 rounded-2xl bg-zinc-50 border-none focus:ring-2 focus:ring-primary">
            <input type="email" id="email" placeholder="Email Address" required class="w-full px-5 py-4 rounded-2xl bg-zinc-50 border-none focus:ring-2 focus:ring-primary">
            <input type="password" id="password" placeholder="Password (min 6)" required minlength="6" class="w-full px-5 py-4 rounded-2xl bg-zinc-50 border-none focus:ring-2 focus:ring-primary">
            <input type="text" id="location" placeholder="City" required class="w-full px-5 py-4 rounded-2xl bg-zinc-50 border-none focus:ring-2 focus:ring-primary">

            <button type="submit" id="submitBtn" class="w-full bg-primary text-white py-5 rounded-full font-bold text-lg hover:bg-emerald-800 transition-all shadow-lg flex items-center justify-center gap-2">
                Create Account
            </button>
        </form>

        <p id="signupError" class="text-center mt-4 text-sm text-red-500 hidden"></p>

        <p class="text-center mt-6 text-sm text-zinc-500">
            Already have an account? <a href="/login/" class="text-primary font-bold">Login</a>
        </p>
    </div>
</main>

<script>
document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> Creating...';

    const data = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        location: document.getElementById('location').value
    };

    try {
        const response = await fetch('/api/auth/signup/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const result = await response.json();

        if (result.token) {
            // Auto-login: store token and name, then redirect to home
            localStorage.setItem('token', result.token);
            localStorage.setItem('user_name', result.name);
            localStorage.setItem('just_signed_up', 'true');
            window.location.href = '/index/';
        } else {
            const errEl = document.getElementById('signupError');
            errEl.textContent = result.error || 'Check your details and try again.';
            errEl.classList.remove('hidden');
            btn.disabled = false;
            btn.innerHTML = 'Create Account';
        }
    } catch (err) {
        const errEl = document.getElementById('signupError');
        errEl.textContent = 'Network error. Is the server running?';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = 'Create Account';
    }
});
</script>
</body>
</html>
