<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sign Up | BasketIQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f9f9f6; }
        .emerald-gradient { background: linear-gradient(135deg, #006036 0%, #1b7a4a 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white p-10 rounded-[2.5rem] shadow-xl border border-zinc-100">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-emerald-900">Create Account</h1>
            <p class="text-zinc-500 mt-2">Join the smart shopping revolution</p>
        </div>
        
        <form id="signupForm" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-zinc-700 mb-2">Full Name</label>
                <input type="text" id="name" required class="w-full p-4 bg-zinc-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-bold text-zinc-700 mb-2">Email Address</label>
                <input type="email" id="email" required class="w-full p-4 bg-zinc-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-bold text-zinc-700 mb-2">Password</label>
                <input type="password" id="password" required class="w-full p-4 bg-zinc-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-bold text-zinc-700 mb-2">City / Location</label>
                <input type="text" id="location" required class="w-full p-4 bg-zinc-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none">
            </div>
            <button type="submit" class="w-full emerald-gradient text-white py-4 rounded-full font-bold text-lg transition-transform hover:scale-[1.02] active:scale-95 shadow-lg shadow-emerald-900/10">
                Register
            </button>
        </form>
        
        <p class="text-center mt-8 text-zinc-600">
            Already have an account? <a href="login.html" class="text-emerald-700 font-bold">Sign In</a>
        </p>
    </div>

    <script type="module">
        import api from './js/api.js';
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                location: document.getElementById('location').value
            };
            
            try {
                const data = await api.signup(userData);
                if (data.message === 'User created successfully') {
                    alert('Signup successful! Please login.');
                    window.location.href = 'login.html';
                } else {
                    alert(data.error || data.detail || 'Signup failed');
                }
            } catch (err) {
                alert('Connection error');
            }
        });
    </script>
</body>
</html>
