<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Profile | BasketIQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f9f9f6; }
        .emerald-gradient { background: linear-gradient(135deg, #006036 0%, #1b7a4a 100%); }
    </style>
</head>
<body class="min-h-screen">
    <header class="max-w-7xl mx-auto px-6 h-24 flex items-center justify-between">
        <div class="text-2xl font-extrabold text-emerald-900 flex items-center gap-2">
            <a href="home.html">🛒 BasketIQ</a>
        </div>
        <button id="logoutBtn" class="text-sm font-bold text-red-500 hover:bg-red-50 px-4 py-2 rounded-xl transition-colors">Sign Out</button>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12 items-start">
            <!-- User Information Panel -->
            <div class="lg:col-span-1 bg-white p-12 rounded-[3.5rem] shadow-xl border border-zinc-100 flex flex-col items-center text-center">
                <div class="w-32 h-32 bg-emerald-50 text-emerald-900 rounded-full flex items-center justify-center text-5xl mb-8">👤</div>
                <h2 id="userName" class="text-3xl font-extrabold text-zinc-900 mb-2">User Name</h2>
                <div class="space-y-4 mb-10 w-full text-left">
                    <div class="p-4 bg-zinc-50 rounded-2xl">
                        <p class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Email Address</p>
                        <p id="userEmail" class="font-bold text-zinc-700">email@example.com</p>
                    </div>
                    <div class="p-4 bg-zinc-50 rounded-2xl">
                        <p class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Location</p>
                        <p id="userLocation" class="font-bold text-zinc-700">City Name</p>
                    </div>
                </div>
                <button class="w-full emerald-gradient text-white py-4 rounded-full font-bold shadow-lg shadow-emerald-900/10 transition-transform active:scale-95">Edit Profile</button>
            </div>

            <!-- Expense Tracker Section -->
            <div class="lg:col-span-2 flex flex-col gap-8">
                <section class="bg-white p-10 rounded-[3.5rem] shadow-xl border border-zinc-100">
                    <div class="flex justify-between items-center mb-10">
                        <h3 class="text-2xl font-extrabold text-zinc-900">Expense Stats 📊</h3>
                        <button class="text-sm font-bold text-emerald-700">+ Add Expense</button>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 h-64">
                         <!-- Placeholder for Chart or Stat list -->
                         <div class="bg-zinc-50 p-6 rounded-3xl flex flex-col justify-between">
                            <p class="font-bold text-zinc-400">Monthly Spending</p>
                            <span class="text-4xl font-extrabold text-emerald-700">₹4,250</span>
                            <div class="w-full h-2 bg-emerald-100 rounded-full">
                                <div class="w-2/3 h-full bg-emerald-700 rounded-full"></div>
                            </div>
                         </div>
                         <div class="bg-zinc-50 p-6 rounded-3xl flex flex-col justify-between">
                            <p class="font-bold text-zinc-400">Total Orders</p>
                            <span class="text-4xl font-extrabold text-emerald-700">12</span>
                            <p class="text-xs text-zinc-400 font-bold">Trend: +2 from last month</p>
                         </div>
                    </div>
                </section>

                <!-- Subscription Section -->
                <section class="bg-zinc-900 text-white p-12 rounded-[3.5rem] relative overflow-hidden">
                    <h4 class="text-2xl font-extrabold mb-4 italic">Subscription Model</h4>
                    <p class="text-zinc-400 text-sm max-w-sm mb-8">Set your recurring essentials once and our AI will fetch them at the lowest historical price.</p>
                    <button class="bg-emerald-700 text-white px-8 py-3 rounded-full font-bold">Manage Subs</button>
                    <span class="absolute right-[-20%] bottom-[-20%] text-[200px] opacity-10 inline-block rotate-12">♻️</span>
                </section>
            </div>
        </div>
    </main>

    <script type="module">
        import api from './js/api.js';

        async function loadProfile() {
            try {
                const profile = await api.getProfile();
                document.getElementById('userName').innerText = profile.name;
                document.getElementById('userEmail').innerText = profile.email;
                document.getElementById('userLocation').innerText = profile.location || 'Not Specified';
            } catch (err) {
                console.error(err);
                if (err.status === 401) window.location.href = 'login.html';
            }
        }
        
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = 'index.html';
        });

        loadProfile();
    </script>
</body>
</html>
